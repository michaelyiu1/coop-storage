name: cloop
services:

  metadata-server:
    build:
      context: ../metadata-server
      dockerfile: Dockerfile.dev
    container_name: metadata-server
    ports:
      - "7678:7678"
    volumes:
      - ../metadata-server:/app
      - ../metadata-server/db:/app/db
    restart: unless-stopped
    networks:
      - storage-network

  osd-server:
    image: rustfs/rustfs:latest
    container_name: osd-server
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API endpoint
      - "9001:9001"   # Web console
    environment:
      # Single-node single-disk (SNSD) — fine for local dev
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"

      # Credentials — override via .env for anything beyond dev
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}

      # Permissive CORS for local dev
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"

      RUSTFS_OBS_LOGGER_LEVEL: info

    volumes:
      - rustfs-data:/data
      - rustfs-logs:/app/logs

    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - >
          curl -sf http://127.0.0.1:9000/health &&
          curl -sf http://127.0.0.1:9001/rustfs/console/health
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    # RustFS runs as UID 10001 — named volumes handle ownership automatically.
    # If you switch to bind mounts, run first:
    #   mkdir -p ./data ./logs && chown -R 10001:10001 ./data ./logs

volumes:
  rustfs-data:
  rustfs-logs:
      
